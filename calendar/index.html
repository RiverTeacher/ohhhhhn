<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>Ohhhhhんカレンダー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .nav-active { color: #3b82f6; }
        .nav-inactive { color: #9ca3af; }
        
        /* タイムラインの高さ設定 */
        .hour-row { height: 60px; border-top: 1px solid #f3f4f6; }
        .event-card { position: absolute; left: 60px; right: 10px; border-left: 4px solid #3b82f6; z-index: 5; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex justify-center overflow-hidden">

    <div class="w-full max-w-md bg-white h-full flex flex-col shadow-xl relative">

        <!-- ヘッダー -->
        <header class="bg-blue-600 text-white p-4 shadow-md z-30 flex justify-between items-center">
            <h1 class="text-xl font-bold" id="app-title">ホーム</h1>
            <div class="bg-blue-500 px-3 py-1 rounded-full text-sm font-medium cursor-pointer hover:bg-blue-400 transition" onclick="jumpToToday()">
                今日
            </div>
        </header>

        <!-- メインコンテンツ -->
        <main class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 relative pb-20" id="main-content">
            
            <!-- ====== 1. トップページ ====== -->
            <div id="page-top" class="p-4 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
                    <p class="text-gray-500 text-sm font-medium" id="top-date-display">日付</p>
                    <h2 class="text-2xl font-bold text-gray-800 mt-1">こんにちは 👋</h2>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-gray-700 mb-3 flex items-center gap-2">
                        <i data-lucide="calendar-clock" class="w-5 h-5 text-blue-500"></i> 今日の予定
                    </h3>
                    <div id="top-today-events" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"></div>
                </div>

                <div>
                    <h3 class="text-lg font-bold text-gray-700 mb-3 flex items-center gap-2">
                        <i data-lucide="check-square" class="w-5 h-5 text-green-500"></i> 未完了のタスク
                    </h3>
                    <div id="top-todos" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden"></div>
                </div>
            </div>

            <!-- ====== 2. カレンダーページ (月/日 切り替え) ====== -->
            <div id="page-calendar" class="hidden flex flex-col h-full overflow-hidden">
                <!-- カレンダー内サブナビ -->
                <div class="flex border-b border-gray-200 bg-white z-20">
                    <button onclick="setCalendarMode('month')" id="btn-mode-month" class="flex-1 py-3 text-sm font-bold tab-active">月表示</button>
                    <button onclick="setCalendarMode('day')" id="btn-mode-day" class="flex-1 py-3 text-sm font-bold text-gray-400">日別表示</button>
                </div>

                <!-- 月表示コンテンツ -->
                <div id="calendar-month-view" class="p-4 flex-1 overflow-y-auto">
                    <div class="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                        <div class="flex justify-between items-center mb-4">
                            <button class="p-2 rounded-full hover:bg-gray-100" onclick="changeMonth(-1)"><i data-lucide="chevron-left"></i></button>
                            <h2 id="calendar-month-year" class="text-lg font-bold text-gray-800">年月</h2>
                            <button class="p-2 rounded-full hover:bg-gray-100" onclick="changeMonth(1)"><i data-lucide="chevron-right"></i></button>
                        </div>
                        <div class="grid grid-cols-7 gap-1 mb-2 text-center text-xs font-medium text-gray-500">
                            <div class="text-red-500">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-500">土</div>
                        </div>
                        <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center"></div>
                    </div>
                </div>

                <!-- 日別表示コンテンツ -->
                <div id="calendar-day-view" class="hidden flex-1 flex flex-col overflow-hidden bg-white">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50 flex-shrink-0">
                        <button class="p-1" onclick="changeDay(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <h3 id="calendar-day-title" class="font-bold text-gray-800">日付</h3>
                        <button class="p-1" onclick="changeDay(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    <div class="flex-1 overflow-y-auto relative p-2 hide-scrollbar" id="day-timeline-container">
                        <!-- タイムライン 0:00 - 23:00 -->
                        <div id="timeline-grid"></div>
                        <!-- 予定カードがここに絶対配置される -->
                        <div id="day-events-layer"></div>
                    </div>
                    <!-- 予定追加ボタン(日別用) -->
                    <button onclick="openModalWithCurrentDay()" class="absolute bottom-24 right-4 bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 transition z-20">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>

            <!-- ====== 3. ToDoページ ====== -->
            <div id="page-todo" class="hidden p-4 h-full flex flex-col">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="todo-input" class="flex-1 bg-white border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm" placeholder="新しいタスクを入力...">
                    <button onclick="addTodo()" class="bg-blue-600 text-white rounded-xl px-4 py-3 shadow-sm flex items-center justify-center">
                        <i data-lucide="plus"></i>
                    </button>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex-1 overflow-y-auto">
                    <ul id="todo-list" class="divide-y divide-gray-100"></ul>
                </div>
            </div>

        </main>

        <!-- ボトムナビ -->
        <nav class="bg-white border-t border-gray-200 flex justify-around items-center p-3 absolute bottom-0 w-full shadow-lg z-30">
            <button onclick="switchTab('top')" class="nav-btn flex flex-col items-center p-2 w-20 nav-active" data-target="top">
                <i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-medium">ホーム</span>
            </button>
            <button onclick="switchTab('calendar')" class="nav-btn flex flex-col items-center p-2 w-20 nav-inactive" data-target="calendar">
                <i data-lucide="calendar" class="w-6 h-6"></i><span class="text-[10px] font-medium">カレンダー</span>
            </button>
            <button onclick="switchTab('todo')" class="nav-btn flex flex-col items-center p-2 w-20 nav-inactive" data-target="todo">
                <i data-lucide="check-square" class="w-6 h-6"></i><span class="text-[10px] font-medium">ToDo</span>
            </button>
        </nav>

        <!-- 予定追加・詳細モーダル -->
        <div id="event-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="font-bold text-gray-800" id="modal-date-title">予定</h3>
                    <button onclick="closeModal()" class="text-gray-400 p-1"><i data-lucide="x"></i></button>
                </div>
                <div class="overflow-y-auto p-4 space-y-5 flex-1 hide-scrollbar">
                    <div id="modal-event-list" class="space-y-3"></div>
                    <div class="pt-4 border-t border-gray-100 space-y-3">
                        <h4 class="text-xs font-bold text-gray-400 uppercase">新しい予定</h4>
                        <input type="text" id="event-title" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="タイトル (必須)">
                        <div class="flex gap-2">
                            <input type="time" id="event-time" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm">
                            <input type="text" id="event-location" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm" placeholder="場所">
                        </div>
                        <textarea id="event-note" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm" rows="2" placeholder="備考"></textarea>
                        <button onclick="addEvent()" class="w-full bg-blue-600 text-white rounded-lg py-2.5 font-bold shadow-md">保存</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="message-modal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center p-4 opacity-0 transition-opacity">
            <div class="bg-white text-gray-800 rounded-xl px-6 py-4 shadow-xl"><p id="message-text" class="text-sm font-medium"></p></div>
        </div>

    </div>

    <script>
        const COOKIE_KEY = 'adv_cal_data_v1';
        const today = new Date();
        const curY = today.getFullYear(), curM = today.getMonth(), curD = today.getDate();
        
        let viewDate = new Date(curY, curM, 1); // 月表示用
        let dayViewDate = new Date(curY, curM, curD); // 日別表示用
        let calendarMode = 'month'; // 'month' or 'day'
        let appData = { events: {}, todos: [] };

        // --- データ同期 ---
        function saveData() {
            document.cookie = `${COOKIE_KEY}=${encodeURIComponent(JSON.stringify(appData))}; max-age=${31536000}; path=/`;
        }
        function loadData() {
            const cookie = document.cookie.split('; ').find(row => row.startsWith(COOKIE_KEY + '='));
            if (cookie) {
                try { appData = JSON.parse(decodeURIComponent(cookie.split('=')[1])); } catch(e) {}
            }
        }

        // --- 画面切替 ---
        function switchTab(tabId) {
            document.getElementById('app-title').innerText = {top:"ホーム", calendar:"カレンダー", todo:"ToDo"}[tabId];
            ['top', 'calendar', 'todo'].forEach(id => document.getElementById(`page-${id}`).classList.add('hidden'));
            document.getElementById(`page-${tabId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.toggle('nav-active', btn.dataset.target === tabId);
                btn.classList.toggle('nav-inactive', btn.dataset.target !== tabId);
            });

            if (tabId === 'top') renderTop();
            if (tabId === 'calendar') renderCalendar();
            if (tabId === 'todo') renderTodos();
        }

        function setCalendarMode(mode) {
            calendarMode = mode;
            document.getElementById('calendar-month-view').classList.toggle('hidden', mode !== 'month');
            document.getElementById('calendar-day-view').classList.toggle('hidden', mode !== 'day');
            
            const mBtn = document.getElementById('btn-mode-month'), dBtn = document.getElementById('btn-mode-day');
            mBtn.className = mode === 'month' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            dBtn.className = mode === 'day' ? 'flex-1 py-3 text-sm font-bold tab-active' : 'flex-1 py-3 text-sm font-bold text-gray-400';
            
            renderCalendar();
        }

        function jumpToToday() {
            viewDate = new Date(curY, curM, 1);
            dayViewDate = new Date(curY, curM, curD);
            if (document.getElementById('page-calendar').classList.contains('hidden')) switchTab('calendar');
            else renderCalendar();
        }

        // --- カレンダー描画 ---
        function renderCalendar() {
            if (calendarMode === 'month') renderMonth();
            else renderDay();
            lucide.createIcons();
        }

        function renderMonth() {
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            document.getElementById('calendar-month-year').innerText = `${y}年 ${m + 1}月`;
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < first; i++) grid.appendChild(document.createElement('div'));
            for (let d = 1; d <= last; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = (y===curY && m===curM && d===curD);
                const hasEv = appData.events[dateStr] && appData.events[dateStr].length > 0;

                const cell = document.createElement('div');
                cell.className = 'aspect-square flex flex-col items-center justify-center rounded-lg cursor-pointer hover:bg-gray-100 transition';
                cell.onclick = () => {
                    dayViewDate = new Date(y, m, d);
                    setCalendarMode('day');
                };

                const span = document.createElement('span');
                span.className = `text-sm font-bold w-7 h-7 flex items-center justify-center rounded-full ${isToday ? 'bg-blue-600 text-white' : 'text-gray-700'}`;
                span.innerText = d;
                cell.appendChild(span);

                if (hasEv) {
                    const dot = document.createElement('div');
                    dot.className = 'w-1 h-1 bg-blue-400 rounded-full mt-0.5';
                    cell.appendChild(dot);
                }
                grid.appendChild(cell);
            }
        }

        function renderDay() {
            const y = dayViewDate.getFullYear(), m = dayViewDate.getMonth(), d = dayViewDate.getDate();
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('calendar-day-title').innerText = `${m+1}月${d}日 (${days[dayViewDate.getDay()]})`;

            // タイムラインの枠線作成
            const grid = document.getElementById('timeline-grid');
            grid.innerHTML = '';
            for (let h = 0; h < 24; h++) {
                const row = document.createElement('div');
                row.className = 'hour-row relative flex';
                row.innerHTML = `<span class="w-12 text-[10px] text-gray-400 text-right pr-2 mt-[-6px]">${h}:00</span>`;
                grid.appendChild(row);
            }

            // 予定カードの配置
            const layer = document.getElementById('day-events-layer');
            layer.innerHTML = '';
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = appData.events[dateStr] || [];

            dayEvents.forEach(ev => {
                if (!ev.time) return; // 時間未設定はここでは表示しない（または上部にまとめ等）
                const [h, min] = ev.time.split(':').map(Number);
                const topPos = (h * 60) + min;

                const card = document.createElement('div');
                card.className = 'event-card bg-blue-50 p-2 rounded shadow-sm overflow-hidden cursor-pointer';
                card.style.top = `${topPos}px`;
                card.style.minHeight = '40px';
                card.onclick = () => openModal(y, m, d);
                card.innerHTML = `
                    <div class="text-[10px] font-bold text-blue-600">${ev.time}</div>
                    <div class="text-xs font-bold text-gray-800 truncate">${ev.text}</div>
                `;
                layer.appendChild(card);
            });
        }

        function changeMonth(delta) {
            viewDate.setMonth(viewDate.getMonth() + delta);
            renderCalendar();
        }
        function changeDay(delta) {
            dayViewDate.setDate(dayViewDate.getDate() + delta);
            renderCalendar();
        }

        // --- モーダル ---
        function openModalWithCurrentDay() {
            openModal(dayViewDate.getFullYear(), dayViewDate.getMonth(), dayViewDate.getDate());
        }

        function openModal(y, m, d) {
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dateObj = new Date(y, m, d);
            const days = ['日','月','火','水','木','金','土'];
            
            selectedDateStr = dateStr;
            document.getElementById('modal-date-title').innerText = `${y}年${m+1}月${d}日 (${days[dateObj.getDay()]})`;
            
            // クリア
            ['event-title','event-time','event-location','event-note'].forEach(id => document.getElementById(id).value = '');
            renderModalEvents();
            document.getElementById('event-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('event-modal').classList.add('hidden');
            renderCalendar();
            if (!document.getElementById('page-top').classList.contains('hidden')) renderTop();
        }

        function renderModalEvents() {
            const list = document.getElementById('modal-event-list');
            list.innerHTML = '';
            const evs = appData.events[selectedDateStr] || [];
            if (evs.length === 0) {
                list.innerHTML = '<p class="text-xs text-center text-gray-400 py-4">予定なし</p>';
            } else {
                evs.forEach(ev => {
                    const div = document.createElement('div');
                    div.className = 'p-3 bg-gray-50 rounded-xl border border-gray-100 relative';
                    div.innerHTML = `
                        <div class="flex items-center gap-2 mb-1">
                            ${ev.time ? `<span class="text-[10px] font-bold bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded">${ev.time}</span>` : ''}
                            <span class="text-sm font-bold text-gray-800">${ev.text}</span>
                        </div>
                        ${ev.location ? `<div class="text-[10px] text-gray-500 flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>${ev.location}</div>` : ''}
                        ${ev.note ? `<div class="text-[10px] text-gray-400 mt-1 whitespace-pre-wrap italic">${ev.note}</div>` : ''}
                        <button onclick="deleteEvent('${ev.id}')" class="absolute top-3 right-3 text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    `;
                    list.appendChild(div);
                });
            }
            lucide.createIcons();
        }

        function addEvent() {
            const title = document.getElementById('event-title').value.trim();
            if (!title) return showMessage("タイトルを入力してください");
            
            const ev = {
                id: Date.now().toString(),
                text: title,
                time: document.getElementById('event-time').value,
                location: document.getElementById('event-location').value.trim(),
                note: document.getElementById('event-note').value.trim()
            };

            if (!appData.events[selectedDateStr]) appData.events[selectedDateStr] = [];
            appData.events[selectedDateStr].push(ev);
            appData.events[selectedDateStr].sort((a,b) => (a.time||'99:99').localeCompare(b.time||'99:99'));
            
            saveData();
            showMessage("保存しました");
            renderModalEvents();
            ['event-title','event-time','event-location','event-note'].forEach(id => document.getElementById(id).value = '');
        }

        function deleteEvent(id) {
            appData.events[selectedDateStr] = appData.events[selectedDateStr].filter(ev => ev.id !== id);
            saveData();
            renderModalEvents();
        }

        // --- ToDo ---
        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            if (appData.todos.length === 0) {
                list.innerHTML = '<p class="p-8 text-center text-gray-400 text-sm">タスクはありません</p>';
            } else {
                appData.todos.forEach(t => {
                    const li = document.createElement('li');
                    li.className = 'p-4 flex items-center justify-between hover:bg-gray-50 cursor-pointer';
                    li.onclick = () => toggleTodo(t.id);
                    li.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded border-2 flex items-center justify-center ${t.done?'bg-green-500 border-green-500':'border-gray-300'}">
                                ${t.done?'<i data-lucide="check" class="w-3 h-3 text-white"></i>':''}
                            </div>
                            <span class="text-sm ${t.done?'text-gray-400 line-through':'text-gray-800'}">${t.text}</span>
                        </div>
                        <button onclick="event.stopPropagation(); deleteTodo('${t.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash" class="w-4 h-4"></i></button>
                    `;
                    list.appendChild(li);
                });
            }
            lucide.createIcons();
        }
        function addTodo() {
            const inp = document.getElementById('todo-input');
            if (!inp.value.trim()) return;
            appData.todos.unshift({ id: Date.now().toString(), text: inp.value.trim(), done: false });
            saveData();
            inp.value = '';
            renderTodos();
        }
        function toggleTodo(id) {
            const t = appData.todos.find(x => x.id === id);
            if (t) { t.done = !t.done; appData.todos.sort((a,b) => a.done - b.done); saveData(); renderTodos(); }
        }
        function deleteTodo(id) {
            appData.todos = appData.todos.filter(x => x.id !== id);
            saveData();
            renderTodos();
        }

        // --- トップページサマリー ---
        function renderTop() {
            const dateStr = `${curY}-${String(curM+1).padStart(2,'0')}-${String(curD).padStart(2,'0')}`;
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('top-date-display').innerText = `${curY}年${curM+1}月${curD}日 (${days[today.getDay()]})`;

            const evCont = document.getElementById('top-today-events');
            const todayEvs = appData.events[dateStr] || [];
            if (todayEvs.length === 0) evCont.innerHTML = '<p class="p-4 text-center text-gray-400 text-xs">予定なし</p>';
            else {
                evCont.innerHTML = todayEvs.map(ev => `
                    <div class="p-3 border-b last:border-0 flex gap-3">
                        <span class="text-[10px] font-bold text-blue-500 w-10">${ev.time||'終日'}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold truncate">${ev.text}</div>
                            ${ev.location ? `<div class="text-[10px] text-gray-400 truncate">${ev.location}</div>` : ''}
                        </div>
                    </div>
                `).join('');
            }

            const todoCont = document.getElementById('top-todos');
            const activeTodos = appData.todos.filter(t => !t.done);
            if (activeTodos.length === 0) todoCont.innerHTML = '<p class="p-4 text-center text-gray-400 text-xs">タスクなし</p>';
            else {
                todoCont.innerHTML = activeTodos.slice(0, 3).map(t => `
                    <div class="p-3 border-b last:border-0 flex items-center gap-3">
                        <div class="w-3 h-3 rounded-full border border-gray-300"></div>
                        <span class="text-xs text-gray-700 truncate">${t.text}</span>
                    </div>
                `).join('');
            }
        }

        function showMessage(msg) {
            const m = document.getElementById('message-modal');
            document.getElementById('message-text').innerText = msg;
            m.classList.remove('hidden');
            setTimeout(() => m.classList.replace('opacity-0', 'opacity-100'), 10);
            setTimeout(() => { m.classList.replace('opacity-100', 'opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); }, 1500);
        }

        window.onload = () => { loadData(); init(); };
    </script>
</body>
</html>
